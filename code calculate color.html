<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Fabric Dye Simulator</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    margin:0;
    font-family:system-ui,-apple-system,BlinkMacSystemFont;
    background:#f2f2f2;
    color:#111;
}
.container{
    max-width:1100px;
    margin:auto;
    padding:24px;
}
.card{
    background:#fff;
    border-radius:16px;
    box-shadow:0 10px 30px rgba(0,0,0,.08);
    padding:20px;
    margin-bottom:24px;
}
h1{margin:0;font-size:28px}
h3{margin-top:0}
p{color:#555}
label{display:block;margin-top:14px;font-size:14px}
input[type=file]{margin-top:10px}
input[type=range]{width:100%}
button{
    margin-top:20px;
    padding:14px 20px;
    font-size:16px;
    border:none;
    border-radius:12px;
    cursor:pointer;
    background:#111;
    color:#fff;
}
.preview{
    display:flex;
    gap:20px;
    flex-wrap:wrap;
}
canvas{
    max-width:100%;
    border-radius:12px;
    background:#eaeaea;
    cursor:crosshair;
}
.small{font-size:13px;color:#666}
.color-box{
    width:40px;
    height:40px;
    border-radius:8px;
    border:1px solid #ccc;
    display:inline-block;
    vertical-align:middle;
    margin-right:10px;
}
</style>
</head>

<body>
<div class="container">

<div class="card">
    <h1>Fabric Dye Simulator</h1>
    <p>จำลองการย้อมผ้าแบบสมจริง (ย้อมเฉพาะตัวเสื้อ ไม่กระทบพื้นหลัง)</p>
</div>

<div class="card">
    <h3>1) อัปโหลดภาพสีที่ใช้ย้อม</h3>
    <input type="file" id="colorInput" accept="image/*">
    <p id="colorInfo" class="small">
        <span class="color-box" id="colorPreview"></span>
        ยังไม่ได้เลือกสี
    </p>
</div>

<div class="card">
    <h3>2) อัปโหลดภาพผ้า</h3>
    <input type="file" id="fabricInput" accept="image/*">
    <p class="small">💡 คลิกบนภาพผ้าเพื่อดูดสี (Eyedropper)</p>
</div>

<div class="card">
    <h3>3) ควบคุมการย้อม</h3>

    <label>Mask Strength
        <input type="range" id="maskStrength" min="0" max="1" step="0.01" value="1">
    </label>

    <label>Dye Strength
        <input type="range" id="dyeStrength" min="0" max="1" step="0.01" value="0.7">
    </label>

    <label>Intensity
        <input type="range" id="intensity" min="0" max="1" step="0.01" value="0.7">
    </label>

    <label>Alpha (การดูดซับผ้า)
        <input type="range" id="alpha" min="0" max="1" step="0.01" value="1">
    </label>

    <button onclick="simulate()">เริ่มจำลองการย้อมผ้า</button>
</div>

<div class="card">
    <h3>4) ผลลัพธ์</h3>
    <div class="preview">
        <canvas id="before"></canvas>
        <canvas id="after"></canvas>
    </div>
    <button onclick="download()">ดาวน์โหลดภาพผลลัพธ์</button>
</div>

</div>

<script>
const colorInput = document.getElementById("colorInput");
const fabricInput = document.getElementById("fabricInput");
const beforeCanvas = document.getElementById("before");
const afterCanvas = document.getElementById("after");
const bctx = beforeCanvas.getContext("2d");
const actx = afterCanvas.getContext("2d");

const colorInfo = document.getElementById("colorInfo");
const colorPreview = document.getElementById("colorPreview");

const maskStrengthInput = document.getElementById("maskStrength");
const dyeStrengthInput  = document.getElementById("dyeStrength");
const intensityInput    = document.getElementById("intensity");
const alphaInput        = document.getElementById("alpha");

let dyeColor = {r:0,g:0,b:0};
let fabricImage = null;

// ================= COLOR IMAGE =================
colorInput.onchange = e=>{
    const img = new Image();
    img.onload = ()=>{
        const c = document.createElement("canvas");
        c.width = img.width;
        c.height = img.height;
        const ctx = c.getContext("2d");
        ctx.drawImage(img,0,0);

        const data = ctx.getImageData(0,0,c.width,c.height).data;
        let r=0,g=0,b=0,count=0;

        for(let i=0;i<data.length;i+=4){
            if(data[i+3]<200) continue;
            r+=data[i];
            g+=data[i+1];
            b+=data[i+2];
            count++;
        }

        dyeColor={
            r:Math.round(r/count),
            g:Math.round(g/count),
            b:Math.round(b/count)
        };

        updateColorInfo("จากภาพสี");
    };
    img.src=URL.createObjectURL(e.target.files[0]);
};

// ================= FABRIC IMAGE =================
fabricInput.onchange = e=>{
    fabricImage=new Image();
    fabricImage.onload=()=>{
        beforeCanvas.width=fabricImage.width;
        beforeCanvas.height=fabricImage.height;
        afterCanvas.width=fabricImage.width;
        afterCanvas.height=fabricImage.height;

        bctx.drawImage(fabricImage,0,0);
        actx.drawImage(fabricImage,0,0);
    };
    fabricImage.src=URL.createObjectURL(e.target.files[0]);
};

// ================= EYEDROPPER =================
beforeCanvas.addEventListener("click",e=>{
    const rect=beforeCanvas.getBoundingClientRect();
    const x=Math.floor((e.clientX-rect.left)*beforeCanvas.width/rect.width);
    const y=Math.floor((e.clientY-rect.top)*beforeCanvas.height/rect.height);
    const px=bctx.getImageData(x,y,1,1).data;

    dyeColor={r:px[0],g:px[1],b:px[2]};
    updateColorInfo("จาก Eyedropper");
});

// ================= SIMULATE DYE =================
function simulate(){
    if(!fabricImage){ alert("กรุณาอัปโหลดภาพผ้า"); return; }

    const maskStrength = +maskStrengthInput.value;
    const dyeStrength  = +dyeStrengthInput.value;
    const intensity    = +intensityInput.value;
    const alpha        = +alphaInput.value;

    const img = bctx.getImageData(0,0,beforeCanvas.width,beforeCanvas.height);
    const d = img.data;

    for(let i=0;i<d.length;i+=4){
        const r=d[i], g=d[i+1], b=d[i+2], a=d[i+3];

        // ✅ ย้อมทุก pixel ของเสื้อ (ไม่แตะพื้นหลัง)
        if(a < 20) continue;

        // 🧠 รักษาเงา / ลายผ้า
        const luminance = (r+g+b)/3 / 255;
        const absorption = 0.3 + 0.7*luminance;

        const blend =
            dyeStrength *
            intensity *
            maskStrength *
            absorption;

        d[i]   = r*(1-blend) + dyeColor.r*blend;
        d[i+1] = g*(1-blend) + dyeColor.g*blend;
        d[i+2] = b*(1-blend) + dyeColor.b*blend;
        d[i+3] = a*alpha;
    }

    actx.putImageData(img,0,0);
}

// ================= DOWNLOAD =================
function download(){
    const a=document.createElement("a");
    a.download="fabric-dye-result.png";
    a.href=afterCanvas.toDataURL("image/png");
    a.click();
}

// ================= UI =================
function updateColorInfo(source){
    colorPreview.style.background =
        `rgb(${dyeColor.r},${dyeColor.g},${dyeColor.b})`;

    colorInfo.innerHTML = `
        <span class="color-box" style="background:rgb(${dyeColor.r},${dyeColor.g},${dyeColor.b})"></span>
        ${source}: RGB(${dyeColor.r}, ${dyeColor.g}, ${dyeColor.b})
    `;
}
</script>
</body>
</html>
