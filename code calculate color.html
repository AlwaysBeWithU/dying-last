<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cool Tone Fabric Dye Studio</title>

<link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;margin:0;padding:0}

body{
    font-family:'Prompt',sans-serif;
    min-height:100vh;
    background:linear-gradient(135deg,#89f7fe,#66a6ff,#43e97b);
    background-size:300% 300%;
    animation:bgMove 12s ease infinite;
    padding:40px 20px;
    color:#04364A;
}

@keyframes bgMove{
    0%{background-position:0% 50%}
    50%{background-position:100% 50%}
    100%{background-position:0% 50%}
}

.container{
    max-width:1200px;
    margin:auto;
}

h1{
    text-align:center;
    font-weight:600;
    margin-bottom:35px;
    font-size:32px;
}

.layout{
    display:grid;
    grid-template-columns:360px 1fr;
    gap:30px;
}

.card{
    background:rgba(255,255,255,0.7);
    backdrop-filter:blur(25px);
    border-radius:28px;
    padding:28px;
    box-shadow:0 25px 50px rgba(0,0,0,0.1);
}

.card h3{
    margin-bottom:15px;
    font-weight:500;
}

input[type=file]{
    width:100%;
    margin-bottom:18px;
    background:#ffffffaa;
    padding:10px;
    border-radius:12px;
    border:none;
}

.slider-box{
    margin-bottom:20px;
}

input[type=range]{
    width:100%;
    accent-color:#00c9a7;
}

.value{
    font-size:13px;
    margin-top:5px;
}

button{
    width:100%;
    padding:15px;
    border:none;
    border-radius:18px;
    font-weight:600;
    font-size:15px;
    cursor:pointer;
    transition:0.3s;
}

.primary{
    background:linear-gradient(90deg,#00c9a7,#009efd);
    color:white;
    box-shadow:0 8px 20px rgba(0,201,167,0.4);
}

.primary:hover{
    transform:translateY(-3px);
    box-shadow:0 12px 25px rgba(0,158,253,0.5);
}

.download{
    background:linear-gradient(90deg,#43e97b,#38f9d7);
    color:#04364A;
    margin-top:15px;
    box-shadow:0 8px 20px rgba(67,233,123,0.4);
}

.download:hover{
    transform:translateY(-3px);
}

.preview{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;
}

canvas{
    width:100%;
    border-radius:20px;
    background:white;
    box-shadow:0 15px 30px rgba(0,0,0,0.1);
}

.color-preview{
    height:40px;
    border-radius:14px;
    margin-top:10px;
    box-shadow:0 8px 20px rgba(0,0,0,0.1);
}

@media(max-width:900px){
    .layout{
        grid-template-columns:1fr;
    }
    .preview{
        grid-template-columns:1fr;
    }
}
</style>
</head>

<body>

<div class="container">
<h1>🌊 Cool Tone Fabric Dye Studio</h1>

<div class="layout">

<div class="card">
<h3>1️⃣ เลือกสี</h3>
<input type="file" id="colorInput" accept="image/*">
<div class="color-preview" id="colorBox"></div>

<h3>2️⃣ อัปโหลดเสื้อ</h3>
<input type="file" id="fabricInput" accept="image/*">

<h3>3️⃣ ปรับความเข้มสี</h3>

<div class="slider-box">
<input type="range" id="strength" min="0" max="1" step="0.01" value="0.7">
<div class="value">ความเข้ม: <span id="strengthVal">70%</span></div>
</div>

<button class="primary" onclick="simulate()">🎨 เริ่มย้อมสี</button>
<button class="download" onclick="download()">⬇ ดาวน์โหลดภาพ</button>

</div>

<div class="card">
<h3>ผลลัพธ์</h3>
<div class="preview">
<canvas id="before"></canvas>
<canvas id="after"></canvas>
</div>
</div>

</div>
</div>

<script>
const colorInput=document.getElementById("colorInput");
const fabricInput=document.getElementById("fabricInput");
const beforeCanvas=document.getElementById("before");
const afterCanvas=document.getElementById("after");
const bctx=beforeCanvas.getContext("2d");
const actx=afterCanvas.getContext("2d");
const strengthSlider=document.getElementById("strength");
const strengthVal=document.getElementById("strengthVal");
const colorBox=document.getElementById("colorBox");

let dyeColor={r:0,g:150,b:255};
let fabricImage=null;

strengthSlider.oninput=()=>{
    strengthVal.textContent=Math.round(strengthSlider.value*100)+"%";
};

colorInput.onchange=e=>{
    const img=new Image();
    img.onload=()=>{
        const c=document.createElement("canvas");
        c.width=img.width;
        c.height=img.height;
        const ctx=c.getContext("2d");
        ctx.drawImage(img,0,0);
        const data=ctx.getImageData(0,0,c.width,c.height).data;

        let r=0,g=0,b=0,count=0;
        for(let i=0;i<data.length;i+=4){
            r+=data[i];
            g+=data[i+1];
            b+=data[i+2];
            count++;
        }

        dyeColor={
            r:Math.round(r/count),
            g:Math.round(g/count),
            b:Math.round(b/count)
        };

        colorBox.style.background=`rgb(${dyeColor.r},${dyeColor.g},${dyeColor.b})`;
    };
    img.src=URL.createObjectURL(e.target.files[0]);
};

fabricInput.onchange=e=>{
    fabricImage=new Image();
    fabricImage.onload=()=>{
        beforeCanvas.width=fabricImage.width;
        beforeCanvas.height=fabricImage.height;
        afterCanvas.width=fabricImage.width;
        afterCanvas.height=fabricImage.height;
        bctx.drawImage(fabricImage,0,0);
        actx.drawImage(fabricImage,0,0);
    };
    fabricImage.src=URL.createObjectURL(e.target.files[0]);
};

function simulate(){
    if(!fabricImage){alert("กรุณาอัปโหลดภาพก่อน");return;}

    const strength=+strengthSlider.value;
    const img=bctx.getImageData(0,0,beforeCanvas.width,beforeCanvas.height);
    const d=img.data;

    for(let i=0;i<d.length;i+=4){
        const r=d[i], g=d[i+1], b=d[i+2];
        const luminance=(r+g+b)/3/255;
        const blend=strength*(0.5+0.5*luminance);

        d[i]=r*(1-blend)+dyeColor.r*blend;
        d[i+1]=g*(1-blend)+dyeColor.g*blend;
        d[i+2]=b*(1-blend)+dyeColor.b*blend;
    }

    actx.putImageData(img,0,0);
}

function download(){
    const link=document.createElement("a");
    link.download="cool-dye-result.png";
    link.href=afterCanvas.toDataURL();
    link.click();
}
</script>

</body>
</html>
